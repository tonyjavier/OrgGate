<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GatoFoco | Produtividade Pessoal</title>
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#FF6B00',
                            orangeHover: '#FF8C2A',
                            orangeMuted: 'rgba(255, 107, 0, 0.15)',
                            bgBase: '#141414',
                            bgSurface: '#1E1E1E',
                            bgElevated: '#252525',
                            textPrimary: '#FFFFFF',
                            textSecondary: '#888888',
                            border: '#2E2E2E',
                            success: '#4CAF50',
                            danger: '#FF4444'

                    },
                    borderRadius: {
                        'custom': '16px'
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🐱</text></svg>">

<body class="bg-[#0b0b0b]">

    <!-- Root container para React -->

    <!-- React and Babel CDNs -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
